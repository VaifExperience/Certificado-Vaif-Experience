<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificado VAIF Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Parisienne&display=swap" rel="stylesheet">
  <style>
    :root {
      --verde-escuro: #0b1712;
      --verde-profundo: #101f18;
      --dourado: #d7b46a;
      --champagne: #ead8b3;
      --texto: #f1dfb8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #050805;
      font-family: 'Inter', Arial, sans-serif;
      color: var(--texto);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 24px;
    }

    .toolbar {
      width: min(1100px, 100%);
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .toolbar input {
      min-width: 300px;
      padding: 13px 16px;
      border: 1px solid rgba(215, 180, 106, .55);
      border-radius: 8px;
      background: #101713;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    .toolbar button {
      padding: 13px 18px;
      border: 1px solid var(--dourado);
      border-radius: 8px;
      background: linear-gradient(135deg, #d7b46a, #f2d99b, #b98b35);
      color: #17120a;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .03em;
    }

    .certificado-wrap {
      width: min(1100px, 100%);
      aspect-ratio: 1.414 / 1;
      background: var(--verde-escuro);
      padding: 18px;
      box-shadow: 0 30px 70px rgba(0,0,0,.55);
    }

    #certificado {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 0%, rgba(215,180,106,.16), transparent 22%),
        radial-gradient(circle at 8% 12%, rgba(215,180,106,.10), transparent 20%),
        radial-gradient(circle at 90% 82%, rgba(215,180,106,.09), transparent 28%),
        linear-gradient(135deg, #09120e 0%, #12231a 52%, #07100c 100%);
      border: 1.6px solid var(--dourado);
    }

    #certificado::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(215,180,106,.75);
      pointer-events: none;
    }

    #certificado::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(120deg, transparent 0 45%, rgba(215,180,106,.035) 46%, transparent 47%),
        repeating-linear-gradient(115deg, rgba(215,180,106,.045) 0 1px, transparent 1px 12px);
      opacity: .45;
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 72px;
      height: 72px;
      border-color: var(--dourado);
      z-index: 3;
      opacity: .9;
    }
    .tl { top: 24px; left: 24px; border-top: 2px solid; border-left: 2px solid; border-radius: 0 0 26px 0; }
    .tr { top: 24px; right: 24px; border-top: 2px solid; border-right: 2px solid; border-radius: 0 0 0 26px; }
    .bl { bottom: 24px; left: 24px; border-bottom: 2px solid; border-left: 2px solid; border-radius: 0 26px 0 0; }
    .br { bottom: 24px; right: 24px; border-bottom: 2px solid; border-right: 2px solid; border-radius: 26px 0 0 0; }

    .conteudo {
      position: relative;
      z-index: 5;
      height: 100%;
      padding: 34px 70px 38px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .logo-vaif {
      width: 310px;
      max-width: 33%;
      object-fit: contain;
      margin-top: -4px;
      filter: drop-shadow(0 0 10px rgba(215,180,106,.25));
    }

    .ornamento {
      width: 190px;
      height: 18px;
      margin: 4px auto 8px;
      position: relative;
    }
    .ornamento::before, .ornamento::after {
      content: "";
      position: absolute;
      top: 8px;
      width: 72px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--dourado));
    }
    .ornamento::before { left: 0; }
    .ornamento::after { right: 0; transform: scaleX(-1); }
    .ornamento span {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 1px solid var(--dourado);
      transform: rotate(45deg);
      margin-top: 2px;
      background: rgba(215,180,106,.08);
    }

    h1 {
      margin: 2px 0 0;
      font-family: 'Cinzel', Georgia, serif;
      font-size: clamp(44px, 6vw, 84px);
      font-weight: 600;
      letter-spacing: .14em;
      line-height: .95;
      color: var(--dourado);
      text-shadow: 0 2px 18px rgba(215,180,106,.18);
    }

    h2 {
      margin: 10px 0 22px;
      font-family: 'Cinzel', Georgia, serif;
      font-size: clamp(18px, 2.2vw, 31px);
      font-weight: 500;
      letter-spacing: .34em;
      color: var(--champagne);
    }

    .certificamos {
      font-family: 'Cinzel', Georgia, serif;
      letter-spacing: .42em;
      font-size: clamp(12px, 1.35vw, 18px);
      color: var(--champagne);
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .nome-participante {
      width: 78%;
      min-height: 56px;
      border-bottom: 1.3px solid rgba(215,180,106,.8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Parisienne', cursive;
      font-size: clamp(30px, 4.6vw, 62px);
      color: #fff7e3;
      margin-bottom: 14px;
      outline: none;
    }

    .texto-central {
      font-family: 'Cinzel', Georgia, serif;
      max-width: 720px;
      font-size: clamp(14px, 1.55vw, 22px);
      line-height: 1.35;
      letter-spacing: .08em;
      color: var(--champagne);
    }

    .texto-central strong {
      display: block;
      margin-top: 2px;
      color: var(--dourado);
      font-weight: 700;
      letter-spacing: .10em;
    }

    .evento-info {
      display: flex;
      gap: 26px;
      align-items: center;
      justify-content: center;
      margin: 23px 0 16px;
      font-family: 'Cinzel', Georgia, serif;
      color: var(--dourado);
      letter-spacing: .08em;
      font-size: clamp(13px, 1.4vw, 19px);
      flex-wrap: wrap;
    }
    .divisor { opacity: .7; }

    .rodape {
      margin-top: auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1.1fr 1fr;
      align-items: end;
      gap: 26px;
    }

    .logo-debora { width: 245px; max-width: 100%; filter: brightness(1.28); }
    .logo-fed { width: 150px; max-width: 100%; opacity: .88; }

    .bloco-logo small {
      display: block;
      margin-top: 8px;
      font-size: 10px;
      letter-spacing: .16em;
      color: rgba(234,216,179,.78);
      text-transform: uppercase;
      line-height: 1.5;
    }

    .assinatura-participante {
      padding-bottom: 6px;
    }
    .linha-assinatura {
      height: 1px;
      width: 100%;
      background: rgba(215,180,106,.85);
      margin-bottom: 11px;
    }
    .assinatura-participante span {
      font-size: 12px;
      letter-spacing: .28em;
      color: var(--champagne);
      text-transform: uppercase;
    }

    @media print {
      body { background: #fff; padding: 0; }
      .toolbar { display: none; }
      .certificado-wrap { width: 297mm; height: 210mm; box-shadow: none; padding: 0; }
      #certificado { border: none; }
    }

    @media (max-width: 780px) {
      .conteudo { padding: 26px 28px 30px; }
      .rodape { grid-template-columns: 1fr; gap: 18px; }
      .logo-vaif { max-width: 52%; }
      .certificado-wrap { aspect-ratio: 1.414 / 1; }
      .bloco-logo small { display: none; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <input id="nomeInput" type="text" placeholder="Digite o nome do participante" />
    <button onclick="atualizarNome()">Atualizar nome</button>
    <button onclick="baixarPNG()">Baixar certificado PNG</button>
    <button onclick="window.print()">Imprimir / Salvar PDF</button>
  </div>

  <main class="certificado-wrap">
    <section id="certificado">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

      <div class="conteudo">
        <img class="logo-vaif" src="assets/logo-vaif.png" alt="VAIF Experience" />
        <div class="ornamento"><span></span></div>

        <h1>CERTIFICADO</h1>
        <h2>DE PARTICIPAÇÃO</h2>

        <div class="certificamos">Certificamos que</div>
        <div id="nomeCertificado" class="nome-participante" contenteditable="true"></div>

        <div class="texto-central">
          participou do <strong>VAIF EXPERIENCE,</strong>
          <strong>A IMERSÃO QUE TRANSFORMA PROFISSIONAIS DA BELEZA EM EMPRESÁRIAS.</strong>
        </div>

        <div class="evento-info">
          <span>27 DE JULHO DE 2026</span>
          <span class="divisor">|</span>
          <span>CARGA HORÁRIA: 4H</span>
        </div>

        <div class="rodape">
          <div class="bloco-logo">
            <img class="logo-debora" src="assets/logo-debora.png" alt="Debora Olliveira" />
            <small>Mentora | Palestrante | Comunicadora<br>Criadora do Método VAIF</small>
          </div>

          <div class="assinatura-participante">
            <div class="linha-assinatura"></div>
            <span>Assinatura do participante</span>
          </div>

          <div class="bloco-logo">
            <img class="logo-fed" src="assets/logo-fepcssp.png" alt="FEPCSSP" />
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script>
    function atualizarNome() {
      const nome = document.getElementById('nomeInput').value.trim();
      document.getElementById('nomeCertificado').textContent = nome;
    }

    async function baixarPNG() {
      atualizarNome();
      const certificado = document.getElementById('certificado');
      const canvas = await html2canvas(certificado, {
        scale: 3,
        useCORS: true,
        backgroundColor: null
      });
      const link = document.createElement('a');
      const nome = document.getElementById('nomeCertificado').textContent.trim() || 'participante';
      link.download = `certificado-vaif-experience-${nome.toLowerCase().replace(/\s+/g, '-')}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
